<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Marketing — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00c46a;--green-dark:#009f56;--navy:#0d1b2a;--gray:#64748b;--gray-light:#f4f7fb;--text:#1e293b}
body{font-family:'Inter',sans-serif;background:var(--gray-light);color:var(--text)}
h1,h2,h3,h4{font-family:'Poppins',sans-serif}

/* LOGIN */
#loginOverlay{position:fixed;inset:0;background:rgba(13,27,42,0.85);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-box h2{font-size:24px;font-weight:800;margin-bottom:4px}
.login-box h2 span{color:var(--green)}
.login-box p{color:var(--gray);font-size:14px;margin-bottom:28px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:16px;outline:none;transition:border-color 0.2s}
.login-box input:focus{border-color:var(--green)}
.login-box button{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.login-box button:hover{background:var(--green-dark)}

/* LAYOUT */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--navy);padding:24px 0;z-index:100}
.sidebar-logo{padding:0 24px 24px;font-family:'Poppins',sans-serif;font-size:18px;font-weight:800;color:#fff;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo span{color:var(--green)}
.sidebar-menu{padding:16px 0}
.sidebar-link{display:block;padding:12px 24px;color:rgba(255,255,255,0.6);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;border:none;background:none;width:100%;text-align:left}
.sidebar-link:hover{color:#fff;background:rgba(255,255,255,0.05)}
.sidebar-link.active{color:#fff;background:rgba(0,196,106,0.15);border-right:3px solid var(--green)}
.sidebar-footer{position:absolute;bottom:0;left:0;right:0;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.08)}
.btn-sair{width:100%;padding:10px;background:rgba(229,57,53,0.15);color:#ef5350;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-sair:hover{background:rgba(229,57,53,0.3)}

.content{margin-left:220px;padding:32px;min-height:100vh}
.page{display:none}
.page.active{display:block}

/* CARDS STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.stat-num{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;color:var(--green)}
.stat-label{font-size:12px;color:var(--gray);margin-top:4px}

/* TABLE */
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:12px;font-weight:600;color:var(--gray);border-bottom:1px solid #e2e8f0;text-transform:uppercase}
td{padding:12px;font-size:14px;border-bottom:1px solid #f1f5f9}
tr:last-child td{border-bottom:none}

/* PROPOSTAS CARDS */
.props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.prop-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;flex-direction:column;gap:10px}
.prop-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.tag-sm{background:#e6fff4;color:#009f56}
.tag-beb{background:#fff3e0;color:#e65100}
.tag-traf{background:#e8f4fd;color:#0277bd}
.tag-prem{background:#fef9e7;color:#f39c12}
.tag-env{background:#e8f4fd;color:#0277bd}
.tag-neg{background:#f3e5f5;color:#7b1fa2}
.tag-gan{background:#e6fff4;color:#009f56}
.tag-per{background:#fde8e8;color:#c62828}
.prop-cliente{font-family:'Poppins',sans-serif;font-weight:800;font-size:16px}
.prop-sub{font-size:12px;color:var(--gray)}
.prop-valor{font-family:'Poppins',sans-serif;font-weight:800;font-size:20px}
.prop-valor span{font-size:13px;font-weight:500;color:var(--gray)}
.prop-actions{display:flex;gap:8px}
.btn-ver{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none}
.btn-ver:hover{background:var(--green-dark)}
.prop-select select{width:100%;padding:8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc}

/* FILTROS */
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filtro-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:var(--gray);font-size:13px;font-weight:600;cursor:pointer}
.filtro-btn.active{background:var(--green);color:#fff;border-color:var(--green)}

/* PLAYBOOKS */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--gray)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--green)}
.btn-primary{background:var(--green);color:#fff;border:none;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:var(--green-dark)}
.btn-danger{background:#fde8e8;color:#c62828;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}

@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:relative}
  .content{margin-left:0}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>GST <span>Marketing</span></h2>
    <p>Dashboard Admin</p>
    <input type="password" id="senhaInput" placeholder="Digite sua senha" />
    <button onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- PAINEL -->
<div id="adminPanel" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">GST <span>Marketing</span></div>
    <div class="sidebar-menu">
      <button class="sidebar-link active" onclick="irPara('analytics',this)">📊 Analytics</button>
      <button class="sidebar-link" onclick="irPara('leads',this)">👥 Leads</button>
      <button class="sidebar-link" onclick="irPara('propostas',this)">📋 Propostas</button>
      <button class="sidebar-link" onclick="irPara('playbooks',this)">📚 Playbooks</button>
    </div>
    <div class="sidebar-footer">
      <button class="btn-sair" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="content">

    <!-- ANALYTICS -->
    <div id="page-analytics" class="page active">
      <h2 style="margin-bottom:20px">Analytics</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="st-leads">0</div><div class="stat-label">Leads Capturados</div></div>
        <div class="stat-card"><div class="stat-num" id="st-props">0</div><div class="stat-label">Propostas</div></div>
        <div class="stat-card"><div class="stat-num" id="st-ganhas">0</div><div class="stat-label">Propostas Ganhas</div></div>
        <div class="stat-card"><div class="stat-num" id="st-conv">0%</div><div class="stat-label">Taxa de Conversão</div></div>
      </div>
    </div>

    <!-- LEADS -->
    <div id="page-leads" class="page">
      <h2 style="margin-bottom:20px">Leads Capturados</h2>
      <div class="card">
        <table id="leadsTable">
          <thead><tr><th>Nome</th><th>WhatsApp</th><th>Loja</th><th>Faturamento</th><th>Data</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- PROPOSTAS -->
    <div id="page-propostas" class="page">
      <h2 style="margin-bottom:16px">Propostas</h2>
      <div class="filtros">
        <button class="filtro-btn active" onclick="filtrar('todos',this)">Todos</button>
        <button class="filtro-btn" onclick="filtrar('supermercado',this)">Supermercado</button>
        <button class="filtro-btn" onclick="filtrar('bebida',this)">Bebidas</button>
        <button class="filtro-btn" onclick="filtrar('tráfego',this)">Só Tráfego</button>
        <button class="filtro-btn" onclick="filtrar('premium',this)">Premium</button>
      </div>
      <div class="props-grid" id="propsGrid"></div>
    </div>

    <!-- PLAYBOOKS -->
    <div id="page-playbooks" class="page">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <h2>Biblioteca de Playbooks</h2>
        <button class="btn-primary" onclick="toggleFormPb()" id="btnNovoPb">+ Novo Playbook</button>
      </div>
      <div id="formPb" style="display:none;background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
        <h3 style="margin-bottom:16px">Cadastrar Playbook</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group"><label>Título</label><input type="text" id="pbTitulo" placeholder="Ex: Playbook Meta Ads"></div>
          <div class="form-group"><label>Categoria</label>
            <select id="pbCategoria">
              <option value="">Selecione...</option>
              <option>Tráfego Pago</option>
              <option>Gestão de Redes</option>
              <option>WhatsApp Marketing</option>
              <option>Pesquisa de Rastreio</option>
              <option>DRE de Marketing</option>
              <option>Eventos & Reinauguração</option>
              <option>Google & SEO Local</option>
              <option>Diagnóstico & Descoberta</option>
              <option>Contrato & Proposta</option>
              <option>Operacional</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>URL do Playbook</label><input type="text" id="pbUrl" placeholder="https://agenciagst.com.br/playbook-..." style="font-family:monospace;font-size:13px"></div>
        <div class="form-group"><label>Descrição</label><input type="text" id="pbDescricao" placeholder="Breve descrição do conteúdo"></div>
        <div style="display:flex;gap:12px">
          <button class="btn-primary" onclick="salvarPlaybook()">💾 Salvar</button>
          <button onclick="toggleFormPb()" style="padding:11px 20px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px">Cancelar</button>
        </div>
      </div>
      <div class="filtros" id="filtrosPb">
        <button class="filtro-btn active" onclick="filtrarPb('todos',this)">Todos</button>
        <button class="filtro-btn" onclick="filtrarPb('Tráfego Pago',this)">Tráfego Pago</button>
        <button class="filtro-btn" onclick="filtrarPb('Gestão de Redes',this)">Redes Sociais</button>
        <button class="filtro-btn" onclick="filtrarPb('WhatsApp Marketing',this)">WhatsApp</button>
        <button class="filtro-btn" onclick="filtrarPb('Diagnóstico & Descoberta',this)">Diagnóstico</button>
        <button class="filtro-btn" onclick="filtrarPb('Contrato & Proposta',this)">Proposta</button>
      </div>
      <div id="pbGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px"></div>
    </div>

  </div>
</div>

<script>
const SUPA_URL = 'https://rybbojxebmmtfhbmnopm.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5YmJvanhlYm1tdGZoYm1ub3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTA1NTIsImV4cCI6MjA5NTA2NjU1Mn0.OYK-XEqCfDc3ApMwyc4Dr6TEarsU9LuUsvt9yGoObio';

// Pressionar Enter no login
document.getElementById('senhaInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

function fazerLogin() {
  const s = document.getElementById('senhaInput').value;
  if (s === 'T@ubate6') {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    localStorage.setItem('gst_admin', '1');
    carregarTudo();
  } else {
    alert('Senha incorreta!');
  }
}

function fazerLogout() {
  localStorage.removeItem('gst_admin');
  location.reload();
}

function irPara(pg, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pg).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function supa(path, opts={}) {
  const r = await fetch(SUPA_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', ...opts.headers },
    ...opts
  });
  if (!r.ok) return null;
  const txt = await r.text();
  return txt ? JSON.parse(txt) : [];
}

let _propostas = [];

async function carregarTudo() {
  // Leads
  const leads = await supa('leads?order=created_at.desc') || [];
  document.getElementById('st-leads').textContent = leads.length;
  const lt = document.getElementById('leadsTable');
  lt.innerHTML = '<thead><tr><th>Nome</th><th>WhatsApp</th><th>Loja</th><th>Faturamento</th><th>Data</th></tr></thead>';
  leads.forEach(l => {
    const tr = lt.insertRow(); 
    tr.innerHTML = `<td>${l.nome}</td><td>${l.whatsapp}</td><td>${l.loja}</td><td>${l.faturamento||'—'}</td><td>${new Date(l.created_at).toLocaleDateString('pt-BR')}</td>`;
  });

  // Propostas
  const props = await supa('propostas?order=created_at.desc') || [];
  _propostas = props;
  const ganhas = props.filter(p => p.status === 'Ganha').length;
  document.getElementById('st-props').textContent = props.length;
  document.getElementById('st-ganhas').textContent = ganhas;
  document.getElementById('st-conv').textContent = props.length ? Math.round(ganhas/props.length*100) + '%' : '0%';
  renderProps(props);

  // Playbooks
  const pbs = await supa('playbooks?order=uploaded_at.desc') || [];
  window._playbooks = pbs;
  renderPbCards(pbs);
}

function tagSeg(titulo) {
  const t = titulo.toLowerCase();
  if (t.includes('bebida')) return '<span class="tag tag-beb">Bebidas</span>';
  if (t.includes('tráfego')||t.includes('trafego')) return '<span class="tag tag-traf">Tráfego</span>';
  if (t.includes('premium')) return '<span class="tag tag-prem">Premium</span>';
  return '<span class="tag tag-sm">Supermercado</span>';
}

function tagStatus(s) {
  const map = {'Enviada':'tag-env','Em Negociação':'tag-neg','Ganha':'tag-gan','Perdida':'tag-per'};
  return `<span class="tag ${map[s]||'tag-env'}">${s}</span>`;
}

function renderProps(props) {
  const grid = document.getElementById('propsGrid');
  grid.innerHTML = props.map(p => `
    <div class="prop-card">
      <div class="prop-tags">${tagSeg(p.titulo)} ${tagStatus(p.status)}</div>
      <div class="prop-cliente">${p.cliente}</div>
      <div class="prop-sub">${p.titulo}</div>
      <div class="prop-valor">R$${p.valor}<span>/mês</span></div>
      ${p.notas && p.notas.startsWith('agenciagst') ? `<div class="prop-actions"><a class="btn-ver" href="https://${p.notas}" target="_blank">🔗 Ver Proposta</a></div>` : ''}
      <div class="prop-select">
        <select onchange="mudarStatus('${p.id}',this.value)">
          <option value="">Mudar status...</option>
          ${['Enviada','Em Negociação','Ganha','Perdida'].map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
  `).join('');
}

function filtrar(seg, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (seg === 'todos') { renderProps(_propostas); return; }
  renderProps(_propostas.filter(p => p.titulo.toLowerCase().includes(seg)));
}

async function mudarStatus(id, status) {
  if (!status) return;
  await supa('propostas?id=eq.' + id, { method: 'PATCH', headers: {'Prefer':'return=minimal'}, body: JSON.stringify({status}) });
  carregarTudo();
}

// Ícones por categoria
function pbIcon(cat) {
  const map = {
    'Tráfego Pago': '🎯',
    'Gestão de Redes': '📱',
    'WhatsApp Marketing': '💬',
    'Pesquisa de Rastreio': '🔍',
    'DRE de Marketing': '📊',
    'Eventos & Reinauguração': '🎉',
    'Google & SEO Local': '🌐',
    'Diagnóstico & Descoberta': '🔬',
    'Contrato & Proposta': '📋',
    'Operacional': '⚙️'
  };
  return map[cat] || '📘';
}

function renderPbCards(pbs) {
  const grid = document.getElementById('pbGrid');
  if (!grid) return;
  if (!pbs.length) {
    grid.innerHTML = '<p style="color:#64748b;font-size:14px;padding:20px 0">Nenhum playbook cadastrado ainda.</p>';
    return;
  }
  grid.innerHTML = pbs.map(p => `
    <div class="prop-card">
      <div style="font-size:32px">${pbIcon(p.categoria)}</div>
      <div class="prop-tags">
        <span class="tag tag-sm" style="background:#f0f4ff;color:#3b4fd4">${p.categoria}</span>
      </div>
      <div class="prop-cliente">${p.titulo}</div>
      <div class="prop-sub" style="min-height:36px">${p.descricao || '—'}</div>
      <div style="font-size:12px;color:#94a3b8">${new Date(p.uploaded_at).toLocaleDateString('pt-BR')}</div>
      <div class="prop-actions" style="margin-top:4px">
        ${p.arquivo_url && p.arquivo_url !== '-' ? 
          `<a class="btn-ver" href="${p.arquivo_url}" target="_blank">📖 Abrir Playbook</a>` 
          : ''}
        <button onclick="deletarPb('${p.id}')" style="background:#fde8e8;color:#c62828;border:none;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">Deletar</button>
      </div>
    </div>
  `).join('');
}

function filtrarPb(cat, btn) {
  document.querySelectorAll('#filtrosPb .filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const todos = window._playbooks || [];
  if (cat === 'todos') { renderPbCards(todos); return; }
  renderPbCards(todos.filter(p => p.categoria === cat));
}

function toggleFormPb() {
  const form = document.getElementById('formPb');
  const btn = document.getElementById('btnNovoPb');
  if (form.style.display === 'none') {
    form.style.display = 'block';
    btn.textContent = '✕ Cancelar';
    form.scrollIntoView({behavior:'smooth', block:'start'});
  } else {
    form.style.display = 'none';
    btn.textContent = '+ Novo Playbook';
  }
}

async function salvarPlaybook() {
  const titulo = document.getElementById('pbTitulo').value;
  const categoria = document.getElementById('pbCategoria').value;
  const descricao = document.getElementById('pbDescricao').value;
  const url = document.getElementById('pbUrl') ? document.getElementById('pbUrl').value.trim() : '';
  if (!titulo || !categoria) { alert('Preencha título e categoria!'); return; }
  const arquivo_url = url ? (url.startsWith('http') ? url : 'https://' + url) : '-';
  await supa('playbooks', { method: 'POST', headers: {'Prefer':'return=minimal'}, body: JSON.stringify({titulo, categoria, descricao, arquivo_nome: url || '-', arquivo_url}) });
  document.getElementById('pbTitulo').value = '';
  document.getElementById('pbCategoria').value = '';
  document.getElementById('pbDescricao').value = '';
  if (document.getElementById('pbUrl')) document.getElementById('pbUrl').value = '';
  toggleFormPb();
  carregarTudo();
}

async function deletarPb(id) {
  if (!confirm('Deletar este playbook?')) return;
  await supa('playbooks?id=eq.' + id, { method: 'DELETE', headers: {'Prefer':'return=minimal'} });
  carregarTudo();
}

// Auto login
if (localStorage.getItem('gst_admin') === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  carregarTudo();
}
</script>
</body>
</html>
